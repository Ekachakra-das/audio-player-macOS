<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Local MP3 Player</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%23ff5500%22/><path d=%22M40 30 L40 70 L75 50 Z%22 fill=%22white%22/></svg>">
  <style>
    :root {
      --orange: #ff5500;
      --orange-dark: #e64d00;
      --bg: #f2f2f2;
      --surface: #ffffff;
      --text: #333333;
      --text-light: #999999;
      --border: #e5e5e5;
      --active-bg: #fff6f1;
      --player-bg: #f2f2f2;
    }

    * {
      box-sizing: border-box;
    }

    button {
      cursor: pointer;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    .container {
      display: grid;
      grid-template-columns: 300px 1fr;
      flex: 1;
      height: calc(100vh - 80px); /* Height minus player bar height */
      overflow: hidden;
    }

    .sidebar {
      background: #f7f7f7;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 20px 0;
      overflow: hidden;
    }

    .sidebar-header {
      padding: 0 20px 10px;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #bbbbbb;
      font-weight: 700;
    }

    .folder-list {
      list-style: none;
      margin: 0;
      padding: 0;
      overflow-y: auto;
      flex: 1;
    }

    .folder-item {
      padding: 9px 20px;
      cursor: pointer;
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: #666666;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: background 0.12s, color 0.12s;
    }

    .folder-icon {
      flex-shrink: 0;
      color: #1a1a1a; /* Dark color for inactive folders */
      transition: color 0.12s;
    }

    .folder-item-text {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .folder-item.active {
      background: #fcfcfc;
      color: var(--orange);
      font-weight: 600;
    }

    .folder-item.active .folder-icon {
      color: #b84300; /* Dark orange/brownish for active folder, matching your image */
    }

    .folder-item:hover:not(.active) {
      background: #fcfcfc;
    }

    .folder-item.hidden {
      display: none;
    }

    .main-content {
      background: var(--surface);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .main-header {
      padding: 30px 40px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: relative;
    }

    .drop-zone {
      position: fixed;
      inset: 0;
      background: rgba(255, 85, 0, 0.08);
      border: 4px dashed var(--orange);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      pointer-events: none;
      font-weight: 700;
      color: var(--orange);
      letter-spacing: 0.06em;
      font-size: 24px;
      backdrop-filter: blur(2px);
    }

    body.dragging .drop-zone {
      display: flex;
    }

    .main-header h1 {
      margin: 0;
      font-size: 26px;
      font-weight: 500;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .search-container {
      position: relative;
      display: flex;
      align-items: center;
    }

    .search-icon {
      position: absolute;
      left: 10px;
      width: 14px;
      height: 14px;
      color: #999999;
      pointer-events: none;
    }

    .search-input {
      background: var(--bg);
      border: 1px solid transparent;
      border-radius: 16px;
      padding: 6px 28px 6px 30px;
      font-size: 13px;
      width: 140px;
      outline: none;
      color: var(--text);
      transition: all 0.2s ease;
    }

    .search-input:focus {
      border-color: var(--orange);
      background: var(--surface);
      box-shadow: 0 0 0 2px rgba(255, 85, 0, 0.15);
      width: 190px;
    }

    .clear-search-btn {
      position: absolute;
      right: 8px;
      background: none;
      border: none;
      padding: 2px;
      cursor: pointer;
      color: #999999;
      display: none;
      align-items: center;
      justify-content: center;
      transition: color 0.1s;
    }

    .search-container.has-value .clear-search-btn {
      display: flex;
    }

    .clear-search-btn:hover {
      color: var(--orange);
    }

    .clear-search-btn svg {
      width: 14px;
      height: 14px;
    }

    .load-btn {
      background: none;
      color: var(--text);
      border: none;
      width: auto;
      height: auto;
      padding: 8px;
      border-radius: 4px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, color 0.2s;
    }

    .load-btn:hover {
      background: rgba(0, 0, 0, 0.05);
      color: var(--orange);
    }

    .load-btn svg {
      width: 24px;
      height: 24px;
      stroke: currentColor;
    }

    .playlist {
      flex: 1;
      overflow-y: auto;
      padding: 10px 0 100px;
    }

    .track-item {
      display: grid;
      grid-template-columns: 50px 1fr 74px;
      align-items: center;
      padding: 10px 40px;
      border-bottom: 1px solid #f2f2f2;
      cursor: pointer;
      font-size: 14px;
      color: var(--text);
      transition: background 0.1s, color 0.1s;
    }

    .track-item:hover {
      background: #fcfcfc;
    }

    .track-item:hover .show-folder-btn {
      opacity: 1;
    }

    .track-item.active {
      background: var(--active-bg);
    }

    .track-item.active .track-name,
    .track-item.active .track-index {
      color: var(--orange);
      font-weight: 500;
    }

    .track-index {
      color: #cccccc;
      font-size: 13px;
      font-family: -apple-system, system-ui;
      font-variant-numeric: tabular-nums;
    }

    .track-name {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      padding-right: 20px;
    }

    .track-duration-wrapper {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
    }

    .track-duration {
      text-align: right;
      color: #999999;
      font-size: 11px;
      font-variant-numeric: tabular-nums;
      font-family: "SF Mono", "Monaco", "Consolas", monospace;
      font-weight: 400;
    }

    .show-folder-btn {
      opacity: 0;
      background: none;
      border: none;
      padding: 4px;
      cursor: pointer;
      color: #999999;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.3s ease;
    }

    .track-item:hover .show-folder-btn:not(.success) {
      opacity: 1;
    }

    .show-folder-btn.success {
      opacity: 1 !important;
      color: #2ecc71 !important;
    }

    .show-folder-btn:hover:not(.success) {
      color: var(--orange);
    }

    .show-folder-btn svg {
      width: 16px;
      height: 16px;
      pointer-events: none;
    }

    .player-bar {
      height: 80px;
      background: linear-gradient(to bottom, #ffffff 0%, #ededed 100%);
      border-top: 1px solid var(--border);
      position: fixed;
      inset: auto 0 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 0 40px 0 20px;
    }

    .track-info-area,
    .controls-area,
    .progress-container {
      min-width: 0;
    }

    .track-info-area {
      width: 400px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      overflow: hidden;
      text-align: right;
    }

    .track-meta {
      display: flex;
      flex-direction: column;
      min-width: 0;
      width: 100%;
    }

    #trackTitleDisplay {
      font-weight: 500;
      font-size: 14px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text);
    }

    .controls-area {
      width: 250px;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 12px;
      flex: 0 0 auto;
    }

    .control-btn {
      background: none;
      border: none;
      cursor: pointer;
      width: auto;
      height: auto;
      padding: 8px;
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.1s, transform 0.1s;
    }

    .control-btn:hover {
      color: var(--orange);
    }

    .control-btn:active {
      transform: scale(0.96);
    }

    .control-btn svg {
      width: 20px;
      height: 20px;
      fill: currentColor;
    }

    #prevButton svg,
    #nextButton svg {
      width: 26px;
      height: 26px;
    }

    .control-btn.active {
      color: var(--orange);
    }

    .play-btn {
      background: #333333;
      border-radius: 50%;
      width: 44px;
      height: 44px;
      color: white;
      padding: 0;
      border: none;
      transition: background 0.1s, transform 0.1s;
    }

    .play-btn:hover {
      background: #000000;
      color: white;
    }

    .play-btn svg {
      width: 22px;
      height: 22px;
    }

    .progress-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }

    .time-group {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-light);
      font-family: "SF Mono", "Monaco", "Consolas", monospace;
      min-width: 48px;
    }

    .time-group.left {
      justify-content: flex-end;
    }
    
    .time-group.right {
      justify-content: flex-start;
    }

    .progress-bar-wrapper {
      flex: 1;
      position: relative;
      height: 4px;
      background: #dddddd;
      cursor: pointer;
      border-radius: 2px;
    }

    .hover-time {
      position: absolute;
      top: -28px;
      left: 0;
      transform: translateX(-50%) translateY(5px);
      background: #333333;
      color: #ffffff;
      padding: 3px 6px;
      border-radius: 4px;
      font-size: 11px;
      font-family: "SF Mono", "Monaco", "Consolas", monospace;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s ease, transform 0.2s ease;
      z-index: 10;
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }

    .hover-time::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 50%;
      transform: translateX(-50%);
      border-width: 4px 4px 0;
      border-style: solid;
      border-color: #333333 transparent transparent transparent;
    }

    .hover-time.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .progress-bar-wrapper::before {
      content: '';
      position: absolute;
      top: -10px;
      bottom: -10px;
      left: 0;
      right: 0;
      z-index: 2;
    }

    .progress-fill {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      background: var(--orange);
      pointer-events: none;
      z-index: 1;
    }

    .hidden {
      display: none;
    }

    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-thumb {
      background: #cccccc;
      border-radius: 3px;
    }

    @media (max-width: 900px) {
      .container {
        grid-template-columns: 1fr;
      }

      .sidebar {
        display: none;
      }

      .main-header,
      .track-item {
        padding-left: 18px;
        padding-right: 18px;
      }

      .player-bar {
        height: auto;
        flex-direction: column;
        align-items: stretch;
        gap: 14px;
        padding: 16px 18px;
      }

      .container {
        height: calc(100vh - 200px);
      }

      .track-info-area,
      .controls-area,
      .progress-container {
        width: 100%;
      }

      .controls-area {
        justify-content: flex-start;
      }
    }
      .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      text-align: center;
      color: #999;
      padding: 0 40px 40px;
    }

    .empty-state-icon {
      width: 100px;
      height: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
      color: #ddd;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      background: #fafafa;
      border-radius: 50%;
      border: 1px solid #eee;
    }

    .empty-state-icon:hover {
      color: var(--orange);
      background: var(--active-bg);
      border-color: #ffe0d0;
      transform: translateY(-4px) scale(1.02);
      box-shadow: 0 12px 24px rgba(255, 85, 0, 0.12);
    }

    .empty-state-icon svg {
      width: 44px;
      height: 44px;
    }

    .empty-state-text {
      font-size: 18px;
      font-weight: 500;
      color: #333;
      margin-bottom: 10px;
      letter-spacing: -0.01em;
    }

    .empty-state-tip {
      font-size: 14px;
      color: #999;
      max-width: 280px;
      line-height: 1.6;
    }

    /* Initial State Management */
    body.is-empty .sidebar,
    body.is-empty .main-header,
    body.is-empty .player-bar {
      display: none !important;
    }

    body.is-empty .container {
      grid-template-columns: 1fr;
    }

    body.is-empty .playlist {
      height: 100vh;
      padding: 0;
    }
  </style>
</head>

  <div class="container">
    <aside class="sidebar">
      <div class="sidebar-header">Folders</div>
      <ul class="folder-list" id="folderList"></ul>

    <main class="main-content" id="dropArea">

              <circle cx="11" cy="11" r="8"></circle>
              <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
            <input type="text" id="searchInput" placeholder="Search..." class="search-input" autocomplete="off">
            <button id="clearSearchBtn" class="clear-search-btn" title="Clear">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

                <line x1="6" y1="6" x2="18" y2="18"></line>

            </button>

          <label class="load-btn" for="folderInput" title="Load Folder">

        <input id="folderInput" class="hidden" type="file" webkitdirectory directory multiple>

      <div class="playlist" id="playlist">

            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">

            </svg>

          <div class="empty-state-text">Welcome to Local MP3 Player</div>
          <div class="empty-state-tip">Drop a folder anywhere or click the icon above to start your music journey</div>
        </div>
      </div>
    </main>
  </div>

  <footer class="player-bar">

      </button>
    </div>

    <div class="progress-container">
      <div class="time-group left">
        <span id="currentTime">0:00</span>
      </div>
      <div class="progress-bar-wrapper" id="progressWrapper">
        <div class="hover-time" id="hoverTime">0:00</div>
        <div class="progress-fill" id="progressFill" style="width: 0%"></div>
      </div>
      <div class="time-group right">
        <span id="duration">0:00</span>
      </div>
    </div>

    <div class="track-info-area">
      <div class="track-meta">
        <div id="trackTitleDisplay">No track selected</div>
      </div>
    </div>

    <audio id="audio" class="hidden"></audio>
  </footer>

  <script>
    const folderInput = document.getElementById('folderInput');
    const audio = document.getElementById('audio');
    const playlist = document.getElementById('playlist');
    const playButton = document.getElementById('playButton');
    const playIconSVG = document.getElementById('playIconSVG');
    const prevButton = document.getElementById('prevButton');
    const nextButton = document.getElementById('nextButton');
    const shuffleButton = document.getElementById('shuffleButton');
    const currentTimeText = document.getElementById('currentTime');
    const durationText = document.getElementById('duration');
    const progressFill = document.getElementById('progressFill');
    const trackTitleDisplay = document.getElementById('trackTitleDisplay');
    const folderList = document.getElementById('folderList');
    const searchInput = document.getElementById('searchInput');
    const clearSearchBtn = document.getElementById('clearSearchBtn');
    const searchContainer = document.getElementById('searchContainer');
    const hoverTime = document.getElementById('hoverTime');
    const progressWrapper = document.getElementById('progressWrapper');

    const PLAY_ICON = '<path d="M8 5v14l11-7z"/>';
    const PAUSE_ICON = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';

    const state = {
      tracks: [],
      filteredTracks: [],
      folders: [],
      activeFolder: null,
      currentTrack: null,
      index: -1,
      isShuffle: false,
      searchQuery: ''
    };

    function updateFilteredTracks() {
      let tracks = state.tracks;
      
      // If no folder selected AND no search query, set empty and return
      if (!state.activeFolder && !state.searchQuery) {
        state.filteredTracks = [];
        state.index = -1;
        renderPlaylist();
        return;
      }

      // Filter by active folder
      if (state.activeFolder) {
        tracks = tracks.filter((t) => t.path === state.activeFolder || t.path.startsWith(state.activeFolder + '/'));
      }
      
      // Filter by search query
      if (state.searchQuery) {
        const query = state.searchQuery.toLowerCase();
        tracks = tracks.filter((t) => t.name.toLowerCase().includes(query));
      }
      
      state.filteredTracks = tracks;

      // Update current playing index if it's still in the filtered list
      if (state.currentTrack) {
        state.index = state.filteredTracks.findIndex((t) => t.file === state.currentTrack.file);
      } else {
        state.index = -1;
      }

      renderPlaylist();
    }

    function formatTime(secs) {
      if (!secs || Number.isNaN(secs)) return '0:00';
      const m = Math.floor(secs / 60);
      const s = Math.floor(secs % 60);
      return `${m}:${s < 10 ? '0' : ''}${s}`;
    }

    function stripPrefix(name) {
      if (name.startsWith('!')) return name.substring(1).trim();
      return name;
    }

    function resetPlayerDisplay() {
      trackTitleDisplay.textContent = 'No track selected';
      currentTimeText.textContent = '0:00';
      durationText.textContent = '0:00';
      progressFill.style.width = '0%';
      playIconSVG.innerHTML = PLAY_ICON;
    }

    function renderSidebar() {
      if (state.folders.length === 0) {
        folderList.innerHTML = '<li style="padding: 20px; color: #8f8579; font-style: italic;">No folders</li>';
        return;
      }

      folderList.innerHTML = state.folders.map((folder) => {
        const parts = folder.split('/').filter(Boolean);
        const depth = parts.length - 1;
        const rawName = parts[parts.length - 1] || 'Library';
        const name = stripPrefix(rawName);
        const isActive = state.activeFolder === folder;

        let isVisible = depth === 0;
        if (!isVisible && state.activeFolder) {
          const parentPath = folder.substring(0, folder.lastIndexOf('/'));
          if (state.activeFolder.startsWith(parentPath)) {
            isVisible = true;
          }
        }

        return `
          <li class="folder-item ${isActive ? 'active' : ''} ${isVisible ? '' : 'hidden'}"
              style="padding-left: ${20 + depth * 15}px"
              onclick="filterByFolder('${folder.replace(/'/g, "\\'")}')">
            <svg class="folder-icon" viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
              <path d="M10 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"></path>
            </svg>
            <span class="folder-item-text">${name}</span>
          </li>
        `;
      }).join('');
    }

    function renderPlaylist() {
      if (!state.activeFolder && !state.searchQuery) {
        playlist.innerHTML = `
          <div class="empty-state">
            <label class="empty-state-icon" for="folderInput" title="Load Folder">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
              </svg>
            </label>
            <div class="empty-state-text">No folder selected</div>
            <div class="empty-state-tip">Select a folder from the sidebar or click the icon above to load music</div>
          </div>
        `;
        return;
      }

      if (state.filteredTracks.length === 0) {
        playlist.innerHTML = `
          <div style="text-align: center; margin-top: 80px; color: #999;">
            <div style="font-size: 16px; margin-bottom: 8px;">${state.searchQuery ? 'No tracks found matching your search' : 'This folder is empty'}</div>
            <div style="font-size: 13px;">Try selecting another folder or clearing your search</div>
          </div>
        `;
        return;
      }

      playlist.innerHTML = state.filteredTracks.map((track, i) => {
        const isActive = state.currentTrack && state.currentTrack.file === track.file;
        const duration = track.duration ? formatTime(track.duration) : '--:--';
        return `
          <div class="track-item ${isActive ? 'active' : ''}" onclick="playTrack(${i})">
            <div class="track-index">${i + 1}</div>
            <div class="track-name">${track.name}</div>
            <div class="track-duration-wrapper">
              <button class="show-folder-btn" onclick="showInFinder(event, ${i})" title="Show in Finder">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
              </button>
              <div class="track-duration">${duration}</div>
            </div>
          </div>
        `;
      }).join('');
    }

    window.showInFinder = function(event, idx) {
      event.preventDefault();
      event.stopPropagation();
      
      const track = state.filteredTracks[idx];
      const filePath = track.file.webkitRelativePath || track.file.name;
      
      // webkitRelativePath starts with the name of the top-level folder selected.
      // If we selected "!Music/", then filePath already starts with "!Music/".
      // We need to construct the full path by appending only the necessary parent structure.
      const baseDir = '/Users/ekachakra/Documents/Audio & Video';
      const fullPath = `${baseDir}/${filePath}`;

      const escapedPath = fullPath.replace(/'/g, "'\\''");
      const command = `open -R '${escapedPath}'`;
      
      const btn = event.currentTarget;
      const originalHTML = btn.innerHTML;

      // Primary copy method
      const copyToClipboard = (text) => {
        if (navigator.clipboard && window.isSecureContext) {
          return navigator.clipboard.writeText(text);
        } else {
          const textArea = document.createElement("textarea");
          textArea.value = text;
          textArea.style.position = "fixed";
          textArea.style.left = "-9999px";
          textArea.style.top = "0";
          document.body.appendChild(textArea);
          textArea.focus();
          textArea.select();
          return new Promise((res, rej) => {
            document.execCommand('copy') ? res() : rej();
            textArea.remove();
          });
        }
      };

      copyToClipboard(command).then(() => {
        btn.classList.add('success');
        btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>';
        
        setTimeout(() => {
          btn.style.opacity = '0';
          setTimeout(() => {
            btn.classList.remove('success');
            btn.innerHTML = originalHTML;
            btn.style.opacity = '';
          }, 300);
        }, 1200);
      }).catch(err => {
        console.error('Copy failed:', err);
        alert('Could not copy command. Track: ' + filePath);
      });
    };

    window.filterByFolder = function(path) {
      state.activeFolder = path;
      state.searchQuery = '';
      if (searchInput) {
        searchInput.value = '';
        if (searchContainer) searchContainer.classList.remove('has-value');
      }
      
      // Persist selection
      localStorage.setItem('lastActiveFolder', path);
      
      updateFilteredTracks();
      renderSidebar();
    };

    window.playTrack = function(idx) {
      if (idx < 0 || idx >= state.filteredTracks.length) return;

      const track = state.filteredTracks[idx];

      if (state.currentTrack && state.currentTrack.file === track.file) {
        if (audio.paused) {
          audio.play();
        } else {
          audio.pause();
        }
        return;
      }

      state.currentTrack = track;
      state.index = idx;

      audio.src = URL.createObjectURL(track.file);
      audio.play();

      trackTitleDisplay.textContent = track.name;
      currentTimeText.textContent = '0:00';
      durationText.textContent = track.duration ? formatTime(track.duration) : '0:00';
      progressFill.style.width = '0%';
      playIconSVG.innerHTML = PAUSE_ICON;
      renderPlaylist();

      // Scroll active track into view
      setTimeout(() => {
        const activeTrack = playlist.querySelector('.track-item.active');
        if (activeTrack) {
          const playlistTop = playlist.scrollTop;
          const playlistHeight = playlist.clientHeight;
          const trackTop = activeTrack.offsetTop;
          const trackHeight = activeTrack.offsetHeight;

          if (trackTop < playlistTop) {
            // Track is above the visible area
            playlist.scrollTo({ top: trackTop, behavior: 'smooth' });
          } else if (trackTop + trackHeight > playlistTop + playlistHeight) {
            // Track is below the visible area
            playlist.scrollTo({ top: trackTop - playlistHeight + trackHeight, behavior: 'smooth' });
          }
        }
      }, 50);
    };

    function nextTrack() {
      if (state.filteredTracks.length === 0) return;

      let nextIdx;
      if (state.isShuffle) {
        nextIdx = Math.floor(Math.random() * state.filteredTracks.length);
      } else {
        nextIdx = state.index + 1;
        if (nextIdx >= state.filteredTracks.length) nextIdx = 0;
      }
      playTrack(nextIdx);
    }

    function prevTrack() {
      if (state.filteredTracks.length === 0) return;

      let prevIdx;
      if (state.isShuffle) {
        prevIdx = Math.floor(Math.random() * state.filteredTracks.length);
      } else {
        prevIdx = state.index - 1;
        if (prevIdx < 0) prevIdx = state.filteredTracks.length - 1;
      }
      playTrack(prevIdx);
    }

    async function handleFiles(files) {
      const audioFiles = Array.from(files).filter((f) => {
        const name = f.name.toLowerCase();
        return name.endsWith('.mp3') || name.endsWith('.m4a') || name.endsWith('.wav');
      });

      if (audioFiles.length === 0) return;

      document.body.classList.remove('is-empty');

      state.tracks = audioFiles.map((f) => {
        const fullPath = f.webkitRelativePath || f.name;
        const parts = fullPath.split('/');
        const fileName = f.name.replace(/\.[^/.]+$/, '');
        const folderPath = parts.length > 1 ? parts.slice(0, -1).join('/') : 'Library';

        return {
          file: f,
          name: fileName,
          path: folderPath,
          duration: null
        };
      }).sort((a, b) => a.path.localeCompare(b.path) || a.name.localeCompare(b.name));

      state.folders = [...new Set(state.tracks.map((t) => t.path))].sort();
      state.activeFolder = null;
      state.currentTrack = null;
      state.searchQuery = '';
      if (searchInput) {
        searchInput.value = '';
        if (searchContainer) searchContainer.classList.remove('has-value');
      }

      // Restore last folder if it exists in the new set
      const lastFolder = localStorage.getItem('lastActiveFolder');
      if (lastFolder && state.folders.includes(lastFolder)) {
        state.activeFolder = lastFolder;
      }

      updateFilteredTracks();
      renderSidebar();
      resetPlayerDisplay();

      if (state.filteredTracks.length > 0) {
        playTrack(0);
      }

      loadDurationsSequentially();
    }

    async function loadDurationsSequentially() {
      for (const track of state.tracks) {
        if (track.duration) continue;
        try {
          track.duration = await getDuration(track.file);
          if (state.filteredTracks.find((t) => t.file === track.file)) {
            renderPlaylist();
          }
          if (state.currentTrack && state.currentTrack.file === track.file) {
            durationText.textContent = formatTime(track.duration);
          }
        } catch (e) {
          console.error('Duration skip', track.name);
        }
      }
    }

    function getDuration(file) {
      return new Promise((resolve) => {
        const tempAudio = new Audio();
        const url = URL.createObjectURL(file);
        tempAudio.src = url;
        tempAudio.onloadedmetadata = () => {
          resolve(tempAudio.duration);
          URL.revokeObjectURL(url);
        };
        tempAudio.onerror = () => {
          resolve(0);
          URL.revokeObjectURL(url);
        };
      });
    }

    if (searchInput) {
      searchInput.addEventListener('input', (e) => {
        state.searchQuery = e.target.value;
        if (searchContainer) {
          if (state.searchQuery) {
            searchContainer.classList.add('has-value');
          } else {
            searchContainer.classList.remove('has-value');
          }
        }
        updateFilteredTracks();
      });

      if (clearSearchBtn) {
        clearSearchBtn.addEventListener('click', () => {
          searchInput.value = '';
          state.searchQuery = '';
          if (searchContainer) searchContainer.classList.remove('has-value');
          updateFilteredTracks();
          searchInput.focus();
        });
      }
    }

    playButton.addEventListener('click', () => {
      if (!audio.src && state.filteredTracks.length > 0) {
        playTrack(0);
        return;
      }
      if (audio.paused) {
        audio.play();
      } else {
        audio.pause();
      }
    });

    prevButton.addEventListener('click', prevTrack);
    nextButton.addEventListener('click', nextTrack);

    shuffleButton.addEventListener('click', () => {
      state.isShuffle = !state.isShuffle;
      shuffleButton.classList.toggle('active', state.isShuffle);
    });

    audio.onplay = () => {
      playIconSVG.innerHTML = PAUSE_ICON;
      if ('mediaSession' in navigator) {
        navigator.mediaSession.playbackState = 'playing';
      }
    };
    audio.onpause = () => {
      playIconSVG.innerHTML = PLAY_ICON;
      if ('mediaSession' in navigator) {
        navigator.mediaSession.playbackState = 'paused';
      }
    };
    audio.onended = nextTrack;

    audio.ontimeupdate = () => {
      if (!audio.duration) return;
      progressFill.style.width = `${audio.currentTime / audio.duration * 100}%`;
      currentTimeText.textContent = formatTime(audio.currentTime);
      
      if ('mediaSession' in navigator && audio.duration) {
        navigator.mediaSession.setPositionState({
          duration: audio.duration,
          playbackRate: audio.playbackRate,
          position: audio.currentTime
        });
      }
    };

    audio.onloadedmetadata = () => {
      durationText.textContent = formatTime(audio.duration);
      if (state.currentTrack && !state.currentTrack.duration) {
        state.currentTrack.duration = audio.duration;
        renderPlaylist();
      }

      if ('mediaSession' in navigator && state.currentTrack) {
        navigator.mediaSession.metadata = new MediaMetadata({
          title: state.currentTrack.name,
          artist: state.activeFolder ? stripPrefix(state.activeFolder.split('/').pop()) : 'Local Library',
          album: state.activeFolder ? stripPrefix(state.activeFolder.split('/').pop()) : 'Music'
        });
      }
    };

    let isScrubbing = false;

    function scrub(e) {
      if (!audio.duration) return;
      const rect = progressWrapper.getBoundingClientRect();
      let percent = (e.clientX - rect.left) / rect.width;
      percent = Math.max(0, Math.min(1, percent));
      audio.currentTime = percent * audio.duration;
      progressFill.style.width = `${percent * 100}%`;
    }

    progressWrapper.addEventListener('mousedown', (e) => {
      if (!audio.duration) return;
      isScrubbing = true;
      progressWrapper.classList.add('seeking');
      scrub(e);
      hoverTime.classList.remove('visible');
    });

    window.addEventListener('mousemove', (e) => {
      if (isScrubbing) {
        scrub(e);
      }
    });

    window.addEventListener('mouseup', () => {
      if (isScrubbing) {
        isScrubbing = false;
        progressWrapper.classList.remove('seeking');
      }
    });

    progressWrapper.addEventListener('mousemove', (e) => {
      if (!audio.duration) return;
      if (isScrubbing) return;
      
      const rect = progressWrapper.getBoundingClientRect();
      let percent = (e.clientX - rect.left) / rect.width;
      percent = Math.max(0, Math.min(1, percent));
      
      hoverTime.textContent = formatTime(percent * audio.duration);
      hoverTime.style.left = `${percent * 100}%`;
      hoverTime.classList.add('visible');
    });

    progressWrapper.addEventListener('mouseleave', () => {
      hoverTime.classList.remove('visible');
    });

    folderInput.onchange = (e) => handleFiles(e.target.files);

    window.ondragover = (e) => {
      e.preventDefault();
      document.body.classList.add('dragging');
    };

    window.ondragleave = (e) => {
      if (e.relatedTarget === null) document.body.classList.remove('dragging');
    };

    window.ondrop = (e) => {
      e.preventDefault();
      document.body.classList.remove('dragging');
      if (e.dataTransfer.files.length > 0) handleFiles(e.dataTransfer.files);
    };

    // Media Session API for MacBook keys
    if ('mediaSession' in navigator) {
      navigator.mediaSession.setActionHandler('play', () => {
        if (audio.src) audio.play();
        else if (state.filteredTracks.length > 0) playTrack(0);
      });
      navigator.mediaSession.setActionHandler('pause', () => audio.pause());
      navigator.mediaSession.setActionHandler('previoustrack', prevTrack);
      navigator.mediaSession.setActionHandler('nexttrack', nextTrack);
      navigator.mediaSession.setActionHandler('seekto', (details) => {
        if (details.seekTime && audio.duration) {
          audio.currentTime = details.seekTime;
        }
      });
    }

    window.addEventListener('keydown', (e) => {
      if (e.code === 'Space') {
        e.preventDefault(); // Prevent default page scrolling
        if (audio.src) {
          if (audio.paused) {
            audio.play();
          } else {
            audio.pause();
          }
        } else if (state.filteredTracks.length > 0) {
          playTrack(0);
        }
      }
    });

    async function getFilesFromHandle(dirHandle) {
      const files = [];
      async function read(handle, parentPath = '') {
        for await (const entry of handle.values()) {
          if (entry.kind === 'file') {
            const name = entry.name.toLowerCase();
            if (name.endsWith('.mp3') || name.endsWith('.m4a') || name.endsWith('.wav')) {
              const file = await entry.getFile();
              const fullPath = parentPath ? `${parentPath}/${entry.name}` : entry.name;
              Object.defineProperty(file, 'webkitRelativePath', { value: fullPath, configurable: true });
              files.push(file);
            }
          } else if (entry.kind === 'directory') {
            const newPath = parentPath ? `${parentPath}/${entry.name}` : entry.name;
            await read(entry, newPath);
          }
        }
      }
      await read(dirHandle);
      return files;
    }

    document.addEventListener('click', async (e) => {
      const btn = e.target.closest('.load-btn, .empty-state-icon');
      if (btn && window.showDirectoryPicker) {
        e.preventDefault();
        try {
          // id: 'musicPlayer' hints the OS to remember the last used directory for this context
          const dirHandle = await window.showDirectoryPicker({ id: 'musicPlayer', mode: 'read' });
          const files = await getFilesFromHandle(dirHandle);
          handleFiles(files);
        } catch (err) {
          if (err.name !== 'AbortError') console.error('Picker error:', err);
        }
      }
    });
  </script>
</body>
</html>
